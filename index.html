<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNIPER PRO · BTC Signal Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       DESIGN: Military targeting / command HUD
       Palette: Deep navy + amber gold + signal
       colors. Bebas Neue for display, JetBrains
       Mono for data, Rajdhani for UI copy.
    ══════════════════════════════════════════ */
    :root {
      --bg0:     #06080b;
      --bg1:     #0a0f16;
      --bg2:     #0f1820;
      --bg3:     #162030;
      --bdr:     #1c2a38;
      --bdr2:    #243546;
      --amber:   #f5a623;
      --amber2:  #ffc654;
      --green:   #00ff9d;
      --green2:  #00c97a;
      --red:     #ff4040;
      --red2:    #cc1f1f;
      --yellow:  #f0c040;
      --cyan:    #00d4ff;
      --text:    #9ab5c4;
      --text2:   #5d7f92;
      --text3:   #2e4455;
      --white:   #e2eff5;
      --mono:    'JetBrains Mono', monospace;
      --disp:    'Bebas Neue', sans-serif;
      --ui:      'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg0);
      color: var(--text);
      font-family: var(--ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Atmospheric glow */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 35% at 50% 0%, rgba(245,166,35,.07) 0%, transparent 65%),
        radial-gradient(ellipse 35% 50% at 95% 85%, rgba(0,212,255,.04) 0%, transparent 55%),
        radial-gradient(ellipse 25% 30% at 5% 60%,  rgba(0,255,157,.03) 0%, transparent 50%);
    }

    /* Grid */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(245,166,35,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,.022) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Scanlines */
    #scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,.045) 3px, rgba(0,0,0,.045) 4px
      );
    }

    /* ── Layout shell ── */
    .shell {
      position: relative; z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 0 15px 80px;
    }

    /* ══════════════════════════
       TOP BAR
    ══════════════════════════ */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 14px;
      border-bottom: 1px solid var(--bdr);
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 10px;
      animation: fromTop .5s ease both;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .brand-name {
      font-family: var(--disp);
      font-size: clamp(1.7rem, 5vw, 2.3rem);
      letter-spacing: .18em;
      color: var(--amber);
      text-shadow: 0 0 28px rgba(245,166,35,.45);
      line-height: 1;
    }
    .brand-sub {
      font-family: var(--mono);
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .1em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .live-pill {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .1em; color: var(--green);
      background: rgba(0,255,157,.06);
      border: 1px solid rgba(0,255,157,.22);
      border-radius: 4px;
      padding: 5px 12px;
    }
    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow:0 0 6px var(--green); }
      50%      { opacity:.25; box-shadow:none; }
    }
    #src-tag {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .08em; color: var(--text3);
      border: 1px solid var(--bdr);
      border-radius: 4px; padding: 5px 10px;
    }

    /* ══════════════════════════
       PRICE HERO
    ══════════════════════════ */
    .price-hero {
      background: var(--bg1);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 26px 22px 20px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      animation: fromBottom .5s .08s ease both;
    }
    .price-hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber) 35%, var(--amber2) 65%, transparent);
    }
    /* Watermark */
    .price-hero::after {
      content: 'BTC';
      position: absolute; right: 18px; bottom: 10px;
      font-family: var(--disp);
      font-size: 6rem; letter-spacing: .08em;
      color: rgba(245,166,35,.04);
      pointer-events: none; line-height: 1;
    }

    .hero-eyebrow {
      font-family: var(--mono); font-size: .6rem;
      letter-spacing: .2em; color: var(--text3);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .hero-row {
      display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    }
    #btc-price {
      font-family: var(--disp);
      font-size: clamp(2.4rem, 9vw, 4.4rem);
      letter-spacing: .03em; color: var(--white); line-height: 1;
      transition: color .3s;
    }
    #btc-change {
      font-family: var(--mono); font-size: .8rem;
      letter-spacing: .04em;
    }
    .up   { color: var(--green) !important; }
    .down { color: var(--red)   !important; }

    .hero-footer {
      margin-top: 12px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    #last-updated {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .08em; color: var(--text3);
    }

    /* corner brackets */
    .bracket-tl, .bracket-br {
      position: absolute;
      width: 14px; height: 14px;
      pointer-events: none;
    }
    .bracket-tl { top: 0; left: 0;
      border-top: 2px solid var(--amber); border-left: 2px solid var(--amber); }
    .bracket-br { bottom: 0; right: 0;
      border-bottom: 2px solid var(--amber); border-right: 2px solid var(--amber); }

    /* ══════════════════════════
       SIGNAL CARD
    ══════════════════════════ */
    .sig-card {
      background: var(--bg1);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 28px 22px;
      margin-bottom: 14px;
      text-align: center;
      position: relative; overflow: hidden;
      transition: border-color .5s, box-shadow .5s, background .5s;
      animation: fromBottom .5s .16s ease both;
    }
    .sig-card.buy  {
      background: linear-gradient(135deg,#061510 0%, var(--bg1) 55%);
      border-color: rgba(0,255,157,.38);
      box-shadow: 0 0 70px rgba(0,255,157,.1), inset 0 0 50px rgba(0,255,157,.03);
    }
    .sig-card.sell {
      background: linear-gradient(135deg,#150606 0%, var(--bg1) 55%);
      border-color: rgba(255,64,64,.38);
      box-shadow: 0 0 70px rgba(255,64,64,.1), inset 0 0 50px rgba(255,64,64,.03);
    }
    .sig-card.wait {
      background: linear-gradient(135deg,#141006 0%, var(--bg1) 55%);
      border-color: rgba(240,192,64,.22);
      box-shadow: 0 0 40px rgba(240,192,64,.07);
    }

    .sig-stripe {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      transition: background .5s;
    }
    .buy  .sig-stripe { background: linear-gradient(90deg,transparent,var(--green),var(--green2),transparent); }
    .sell .sig-stripe { background: linear-gradient(90deg,transparent,var(--red),var(--red2),transparent); }
    .wait .sig-stripe { background: linear-gradient(90deg,transparent,var(--yellow),transparent); }

    .sig-eyebrow {
      font-family: var(--mono); font-size: .6rem;
      letter-spacing: .22em; color: var(--text3);
      text-transform: uppercase; margin-bottom: 14px;
    }
    #signal-text {
      font-family: var(--disp);
      font-size: clamp(2rem, 8vw, 3.6rem);
      letter-spacing: .14em; line-height: 1;
      transition: color .4s, text-shadow .4s;
      color: var(--yellow);
    }
    .buy  #signal-text { color: var(--green);  text-shadow: 0 0 32px rgba(0,255,157,.5); }
    .sell #signal-text { color: var(--red);    text-shadow: 0 0 32px rgba(255,64,64,.5); }
    .wait #signal-text { color: var(--yellow); text-shadow: 0 0 22px rgba(240,192,64,.4); }

    #signal-desc {
      font-family: var(--ui); font-size: .88rem;
      color: var(--text2); margin-top: 12px;
      font-weight: 400; letter-spacing: .03em;
    }

    /* ══════════════════════════
       ERROR
    ══════════════════════════ */
    #error-box {
      display: none;
      background: rgba(255,64,64,.06);
      border: 1px solid rgba(255,64,64,.25);
      border-radius: 8px; padding: 11px 16px;
      margin-bottom: 13px;
      font-family: var(--mono); font-size: .65rem;
      color: var(--red); text-align: center;
      letter-spacing: .06em;
    }

    /* ══════════════════════════
       TWO-COL ROW
    ══════════════════════════ */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
      animation: fromBottom .5s .24s ease both;
    }
    @media (max-width: 560px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Panel base ── */
    .panel {
      background: var(--bg1);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 17px 15px;
      position: relative; overflow: hidden;
    }
    .panel-title {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .18em; color: var(--text3);
      text-transform: uppercase; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-title::before {
      content: '';
      width: 3px; height: 10px;
      background: var(--amber); border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── RSI panel ── */
    .rsi-num-row {
      display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
    }
    #rsi-number {
      font-family: var(--disp); font-size: 2.4rem;
      color: var(--white); letter-spacing: .04em; line-height: 1;
    }
    #rsi-zone-lbl {
      font-family: var(--mono); font-size: .65rem;
      letter-spacing: .1em; color: var(--text2);
    }

    .rsi-track {
      height: 8px; background: rgba(255,255,255,.04);
      border-radius: 999px; position: relative; overflow: visible;
      margin-bottom: 7px;
    }
    .rsi-os {
      position: absolute; left:0; top:0; bottom:0; width:30%;
      background: rgba(255,64,64,.1); border-radius: 999px 0 0 999px;
    }
    .rsi-ob {
      position: absolute; right:0; top:0; bottom:0; width:30%;
      background: rgba(0,255,157,.07); border-radius: 0 999px 999px 0;
    }
    #rsi-fill {
      position: absolute; left:0; top:0; bottom:0;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
      border-radius: 999px; transition: width .7s cubic-bezier(.4,0,.2,1);
    }
    #rsi-thumb {
      position: absolute; top: 50%;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--white); border: 2px solid var(--amber);
      transform: translate(-50%,-50%);
      transition: left .7s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(245,166,35,.5); z-index: 2;
    }
    .rsi-labs {
      display: flex; justify-content: space-between;
      font-family: var(--mono); font-size: .54rem;
      color: var(--text3); letter-spacing: .04em;
    }

    /* ── Trend alignment panel ── */
    .trend-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--bdr);
    }
    .trend-row:first-of-type { padding-top: 0; }
    .trend-row:last-of-type  { border-bottom: none; padding-bottom: 0; }

    .tr-tf {
      font-family: var(--disp); font-size: 1.15rem;
      letter-spacing: .12em; color: var(--amber); min-width: 38px;
    }
    .tr-ema-vals {
      font-family: var(--mono); font-size: .6rem;
      color: var(--text2); line-height: 1.7; text-align: center; flex: 1;
    }
    .tr-badge {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .08em; padding: 4px 10px;
      border-radius: 4px; font-weight: 700;
    }
    .b-up   { background:rgba(0,255,157,.11); color:var(--green);  border:1px solid rgba(0,255,157,.28); }
    .b-down { background:rgba(255,64,64,.11);  color:var(--red);    border:1px solid rgba(255,64,64,.28); }
    .b-side { background:rgba(240,192,64,.07); color:var(--yellow); border:1px solid rgba(240,192,64,.2); }
    .b-na   { background:rgba(30,42,56,.4);    color:var(--text3);  border:1px solid var(--bdr); }

    /* ══════════════════════════
       EMA VALUE GRID
    ══════════════════════════ */
    .ema-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 14px;
      animation: fromBottom .5s .32s ease both;
    }
    @media (max-width: 560px) { .ema-grid { grid-template-columns: 1fr 1fr; } }

    .ema-box {
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 14px 12px; text-align: center;
    }
    .ema-box-lbl {
      font-family: var(--mono); font-size: .54rem;
      letter-spacing: .13em; color: var(--text3);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .ema-box-val {
      font-family: var(--disp); font-size: 1.05rem;
      color: var(--text); letter-spacing: .03em;
    }
    .ema-box-sub {
      font-family: var(--mono); font-size: .5rem;
      color: var(--text3); margin-top: 3px;
    }

    /* ══════════════════════════
       DETAIL TABLE
    ══════════════════════════ */
    .detail-wrap {
      background: var(--bg1);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      animation: fromBottom .5s .4s ease both;
    }
    .dt-hdr {
      display: grid;
      grid-template-columns: 65px 1fr 1fr 1fr 1fr;
      padding: 9px 15px;
      background: rgba(0,0,0,.25);
      border-bottom: 1px solid var(--bdr);
    }
    .dt-row {
      display: grid;
      grid-template-columns: 65px 1fr 1fr 1fr 1fr;
      padding: 12px 15px;
      border-bottom: 1px solid var(--bdr);
      align-items: center;
    }
    .dt-row:last-child { border-bottom: none; }
    .dth {
      font-family: var(--mono); font-size: .55rem;
      letter-spacing: .12em; color: var(--text3);
      text-transform: uppercase;
    }
    .dtf {
      font-family: var(--disp); font-size: .88rem;
      letter-spacing: .1em; color: var(--amber);
    }
    .dtv {
      font-family: var(--mono); font-size: .62rem;
      color: var(--text2);
    }
    @media (max-width:500px) {
      .dt-hdr, .dt-row { grid-template-columns:50px 1fr 1fr 1fr 1fr; padding:10px 9px; }
    }

    /* ══════════════════════════
       COUNTDOWN
    ══════════════════════════ */
    .cd-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 26px;
      animation: fromBottom .5s .48s ease both;
    }
    .cd-lbl {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .1em; color: var(--text3);
      white-space: nowrap;
    }
    #cd-num {
      font-family: var(--disp); font-size: 1rem;
      color: var(--amber); letter-spacing: .1em; min-width: 26px;
    }
    .cd-track {
      flex: 1; height: 3px;
      background: rgba(255,255,255,.05);
      border-radius: 999px; overflow: hidden;
    }
    #cd-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--amber2));
      border-radius: 999px;
      transition: width .9s linear;
    }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    footer {
      text-align: center; padding-top: 18px;
      border-top: 1px solid var(--bdr);
    }
    .ft-line {
      font-family: var(--mono); font-size: .57rem;
      letter-spacing: .12em; color: var(--text3);
      margin-bottom: 3px;
    }
    .ft-warn {
      font-family: var(--mono); font-size: .52rem;
      color: var(--bdr2); letter-spacing: .08em; margin-top: 6px;
    }

    /* ══════════════════════════
       ANIMATIONS
    ══════════════════════════ */
    @keyframes fromTop {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fromBottom {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ══════════════════════════
       SHIMMER LOADER
    ══════════════════════════ */
    .shim {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shim 1.5s infinite;
      border-radius: 4px;
      color: transparent !important;
      display: inline-block; min-height: 1em;
    }
    @keyframes shim {
      0%   { background-position: 200% 0; }
      100% { background-position:-200% 0; }
    }
  </style>
</head>
<body>
  <div id="scanlines"></div>
  <div class="shell">

    <!-- ▸ Top Bar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-name">SNIPER PRO</span>
        <span class="brand-sub">BTC/USDT · SIGNAL TERMINAL</span>
      </div>
      <div class="topbar-right">
        <div id="src-tag">SRC: —</div>
        <div class="live-pill"><span class="pulse"></span>LIVE</div>
      </div>
    </header>

    <!-- ▸ Price Hero -->
    <section class="price-hero" aria-label="Current BTC price">
      <div class="bracket-tl"></div>
      <div class="bracket-br"></div>
      <div class="hero-eyebrow">BITCOIN · USDT · SPOT PRICE</div>
      <div class="hero-row">
        <div id="btc-price" class="shim" style="min-width:240px">$——,———.——</div>
        <div id="btc-change"></div>
      </div>
      <div class="hero-footer">
        <div id="last-updated">WAITING…</div>
      </div>
    </section>

    <!-- ▸ Signal Card -->
    <section class="sig-card wait" id="signal-card" aria-label="Trading signal">
      <div class="sig-stripe"></div>
      <div class="bracket-tl"></div>
      <div class="bracket-br"></div>
      <div class="sig-eyebrow">TRADING SIGNAL · DUAL TF CONFIRMATION</div>
      <div id="signal-text" class="shim" style="min-width:210px">⏳ LOADING…</div>
      <div id="signal-desc">Connecting to market data…</div>
    </section>

    <!-- ▸ Error -->
    <div id="error-box" role="alert"></div>

    <!-- ▸ RSI + Trend row -->
    <div class="two-col">

      <!-- RSI panel -->
      <div class="panel">
        <div class="panel-title">RSI · 14 · 5-MINUTE</div>
        <div class="rsi-num-row">
          <div id="rsi-number">—</div>
          <div id="rsi-zone-lbl">—</div>
        </div>
        <div class="rsi-track">
          <div class="rsi-os"></div>
          <div class="rsi-ob"></div>
          <div id="rsi-fill"  style="width:50%"></div>
          <div id="rsi-thumb" style="left:50%"></div>
        </div>
        <div class="rsi-labs">
          <span>0</span><span>&lt;30 OS</span><span>50</span><span>OB&gt;70</span><span>100</span>
        </div>
      </div>

      <!-- Trend alignment panel -->
      <div class="panel">
        <div class="panel-title">EMA TREND ALIGNMENT</div>
        <div class="trend-row">
          <div class="tr-tf">5M</div>
          <div class="tr-ema-vals">
            <div id="ema50-5m-mini">EMA50: —</div>
            <div id="ema200
