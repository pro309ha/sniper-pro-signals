<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNIPER \u2014 BTC Signal Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       DESIGN DIRECTION: Military-grade command
       terminal. Amber + dark slate. Precision
       instrument aesthetic. Every pixel earned.
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    :root {
      --bg0:      #07090c;
      --bg1:      #0c1017;
      --bg2:      #111820;
      --bg3:      #172030;
      --border:   #1e2d3d;
      --border2:  #243545;
      --amber:    #f5a623;
      --amber2:   #ffbe55;
      --green:    #00ff9d;
      --green2:   #00cc7a;
      --red:      #ff3d3d;
      --red2:     #cc2020;
      --yellow:   #f0c040;
      --cyan:     #00d4ff;
      --text:     #a8c0cc;
      --text2:    #6a8899;
      --text3:    #384e5c;
      --white:    #e8f4f8;

      --font-mono:    'JetBrains Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
      --font-ui:      'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg0);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* \u2500\u2500 Atmospheric background \u2500\u2500 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(245,166,35,.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 90% 80%, rgba(0,212,255,.03) 0%, transparent 50%);
    }

    /* \u2500\u2500 Grid overlay \u2500\u2500 */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(245,166,35,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* \u2500\u2500 Scanlines \u2500\u2500 */
    .scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px
      );
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       LAYOUT
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    .shell {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       HEADER / NAV BAR
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
      animation: fadeDown .5s ease both;
    }

    .brand {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: .2em;
      color: var(--amber);
      text-shadow: 0 0 24px rgba(245,166,35,.4);
      line-height: 1;
    }
    .brand sub {
      font-family: var(--font-mono);
      font-size: .48em;
      color: var(--text2);
      letter-spacing: .1em;
      vertical-align: middle;
      margin-left: 8px;
    }

    .status-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .1em;
      color: var(--green);
      background: rgba(0,255,157,.06);
      border: 1px solid rgba(0,255,157,.2);
      border-radius: 4px;
      padding: 5px 12px;
    }
    .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 6px var(--green); }
      50% { opacity:.3; box-shadow: none; }
    }

    #source-tag {
      font-family: var(--font-mono);
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .08em;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       PRICE HERO
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    .price-hero {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px 22px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeUp .5s .1s ease both;
    }
    .price-hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--amber) 40%, var(--amber2) 60%, transparent 100%);
    }
    .price-hero::after {
      content: 'BTC';
      position: absolute; right: 20px; bottom: 14px;
      font-family: var(--font-display);
      font-size: 5rem;
      color: rgba(245,166,35,.04);
      letter-spacing: .1em;
      pointer-events: none;
    }

    .price-eyebrow {
      font-family: var(--font-mono);
      font-size: .62rem;
      letter-spacing: .18em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      flex-wrap: wrap;
    }

    #btc-price {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 9vw, 4.2rem);
      letter-spacing: .04em;
      color: var(--white);
      line-height: 1;
      transition: color .3s;
    }
    #btc-price.up   { color: var(--green); }
    #btc-price.down { color: var(--red); }

    #btc-change {
      font-family: var(--font-mono);
      font-size: .82rem;
      transition: color .3s;
    }
    .chg-up   { color: var(--green); }
    .chg-down { color: var(--red); }

    .price-footer {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    #last-updated {
      font-family: var(--font-mono);
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .08em;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       SIGNAL CARD
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    .signal-card {
      border-radius: 8px;
      padding: 30px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      text-align: center;
      transition: border-color .5s, box-shadow .5s, background .5s;
      background: var(--bg1);
      border: 1px solid var(--border);
      animation: fadeUp .5s .2s ease both;
    }

    .signal-card.buy {
      background: linear-gradient(135deg, #071a10 0%, var(--bg1) 60%);
      border-color: rgba(0,255,157,.35);
      box-shadow: 0 0 60px rgba(0,255,157,.1), inset 0 0 60px rgba(0,255,157,.03);
    }
    .signal-card.sell {
      background: linear-gradient(135deg, #1a0707 0%, var(--bg1) 60%);
      border-color: rgba(255,61,61,.35);
      box-shadow: 0 0 60px rgba(255,61,61,.1), inset 0 0 60px rgba(255,61,61,.03);
    }
    .signal-card.wait {
      background: linear-gradient(135deg, #1a1507 0%, var(--bg1) 60%);
      border-color: rgba(240,192,64,.2);
      box-shadow: 0 0 40px rgba(240,192,64,.06);
    }

    .signal-stripe {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      transition: background .5s;
    }
    .buy  .signal-stripe { background: linear-gradient(90deg, transparent, var(--green), var(--green2), transparent); }
    .sell .signal-stripe { background: linear-gradient(90deg, transparent, var(--red), var(--red2), transparent); }
    .wait .signal-stripe { background: linear-gradient(90deg, transparent, var(--yellow), transparent); }

    .signal-label-top {
      font-family: var(--font-mono);
      font-size: .62rem;
      letter-spacing: .22em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    #signal-main {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 3.4rem);
      letter-spacing: .12em;
      line-height: 1;
      transition: color .4s, text-shadow .4s;
    }
